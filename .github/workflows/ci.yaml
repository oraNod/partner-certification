name: Ansible Docsite CI

"on":
  schedule:
    # Daily
    - cron: "23 7 * * *"
  pull_request:
    types:
    - opened  # default
    - synchronize  # default
    - reopened  # default
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nox:
    uses: ./.github/workflows/reusable-nox.yml

  check:
    if: always()

    needs:
      - nox

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
